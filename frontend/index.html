<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deb Blogs — Elegant Thoughts</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Site Header -->

    <header class="site-header">

        <div class="container">

            <a href="index.html" class="logo">Deb Blogs</a>

            <nav>

                <ul class="nav-links">

                    <li><a href="index.html" class="active">Home</a></li>

                    <li><a href="gallery.html">Gallery</a></li>

                    <li id="authNav">

                        <!-- Populated by JS -->

                    </li>

                </ul>

            </nav>

        </div>

    </header>



    <!-- Hero Section -->

    <section class="hero">

        <div class="container">

            <h1>Reflections on <span class="accent-text">Life & Code</span></h1>

            <p class="hero-sub">A curated collection of thoughts, stories, and insights for the modern developer.</p>

        </div>

    </section>



    <!-- Main Content -->

    <main class="container">

        <!-- Posts Grid -->

        <div id="postsContainer">

            <!-- Loading State -->

            <div class="loader" id="loadingState">

                <div class="spinner"></div>

            </div>



            <!-- Empty State -->

            <div id="emptyState" style="display: none; text-align: center; padding: 4rem;">

                <p class="text-muted">The archive is currently empty. Check back soon.</p>

            </div>



            <!-- Posts List -->

            <div class="post-grid" id="postsList">

                <!-- Posts will be dynamically inserted here -->

            </div>

        </div>



        <!-- Pagination -->

        <div class="text-center" style="margin-top: 4rem; display: none;" id="pagination">

            <button class="btn btn-outline" id="prevButton" disabled>Previous</button>

            <span id="pageInfo" style="margin: 0 1.5rem; font-size: 0.9rem; font-weight: 600;">Page 1 of 1</span>

            <button class="btn btn-outline" id="nextButton" disabled>Next</button>

        </div>

    </main>



    <!-- Footer -->

    <footer class="site-footer">

        <div class="container">

            <p class="copyright">&copy; 2026 Deb Blogs. Crafted with elegance.</p>

        </div>

    </footer>



    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script src="js/home.js"></script>

    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const authNav = document.getElementById('authNav');

            const token = localStorage.getItem('access_token');

            if (token) {

                authNav.innerHTML = `<a href="#" onclick="localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); location.reload();">Logout</a>`;

            } else {

                authNav.innerHTML = `<a href="login.html">Login</a>`;

            }

        });

    </script>

    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

</body>

</html>
