<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deb Blogs — Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Site Header -->
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="logo">Deb Blogs</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li id="authNav">
                        <!-- Populated by JS -->
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1>Visual <span class="accent-text">Narratives</span></h1>
            <p class="hero-sub">A collection of moments captured through the lens.</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items will be dynamically inserted here -->
        </div>

        <div id="emptyState" style="display: none; text-align: center; padding: 4rem;">
            <p class="text-muted">No images available in the collection yet.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            
            <p class="copyright">&copy; 2026 Deb Blogs. Crafted with elegance.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const authNav = document.getElementById('authNav');
            const token = localStorage.getItem('access_token');
            if (token) {
                authNav.innerHTML = `<a href="#" onclick="localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); location.reload();">Logout</a>`;
            } else {
                authNav.innerHTML = `<a href="login.html">Login</a>`;
            }

            loadGallery();
        });

        function loadGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('emptyState');
            
            const galleryItems = [
                { title: 'Coastline', img: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=800' },
                { title: 'Mountain Peak', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800' },
                { title: 'Urban Flow', img: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&q=80&w=800' },
                { title: 'Forest Path', img: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=800' },
                { title: 'Desert Sands', img: 'https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?auto=format&fit=crop&q=80&w=800' },
                { title: 'Starry Night', img: 'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=800' }
            ];

            if (galleryItems.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            galleryGrid.innerHTML = '';
            galleryItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${item.img}" alt="${item.title}">`;
                galleryGrid.appendChild(div);
            });
        }
    </script>
</body>
</html>
